# ─────────────────────────────────────────────────────────────────────────────
# release.yml — Build AOT CLI binaries + managed DLL, create GitHub Release
# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically on v* tags, or manually via workflow_dispatch.
# Produces:
#   • SharpImage-Cli-win-x64.zip       (native AOT executable)
#   • SharpImage-Cli-linux-x64.tar.gz  (native AOT executable)
#   • SharpImage-Cli-osx-x64.tar.gz    (native AOT executable — cross-compiled)
#   • SharpImage-Cli-osx-arm64.tar.gz  (native AOT executable)
#   • SharpImage-Library.zip            (managed DLL for direct reference)
#
# Both macOS targets build on macos-latest (Apple Silicon). The Xcode universal
# toolchain allows cross-compiling osx-x64 from an ARM64 runner via clang.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1 — without the v prefix)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONFIGURATION: Release
  CLI_PROJECT: src/SharpImage.Cli/SharpImage.Cli.csproj
  LIB_PROJECT: src/SharpImage/SharpImage.csproj

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build native AOT CLI binaries (one per platform)
  # continue-on-error: true so a single platform failure doesn't block the
  # GitHub Release from being created with the other successful artifacts.
  # ───────────────────────────────────────────────────────────────────────────
  build-cli:
    name: CLI · ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar
          - rid: osx-x64
            os: macos-latest   # ARM64 runner; Xcode toolchain cross-compiles to x64
            archive: tar
          - rid: osx-arm64
            os: macos-latest
            archive: tar

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $TAG"

      - name: Publish AOT
        run: >
          dotnet publish ${{ env.CLI_PROJECT }}
          -c ${{ env.CONFIGURATION }}
          -r ${{ matrix.rid }}
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish

      - name: Package (zip) — Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath SharpImage-Cli-${{ matrix.rid }}.zip

      - name: Package (tar.gz) — Linux/macOS
        if: matrix.archive == 'tar'
        run: tar -czf SharpImage-Cli-${{ matrix.rid }}.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.rid }}
          path: SharpImage-Cli-${{ matrix.rid }}.*
          retention-days: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Build the managed DLL (framework-dependent, cross-platform)
  # ───────────────────────────────────────────────────────────────────────────
  build-dll:
    name: Library DLL
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $TAG"

      - name: Build library
        run: >
          dotnet build ${{ env.LIB_PROJECT }}
          -c ${{ env.CONFIGURATION }}
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o ./lib-output

      - name: Package DLL
        run: |
          mkdir -p ./lib-package
          cp ./lib-output/SharpImage.dll ./lib-package/
          cp ./lib-output/SharpImage.xml ./lib-package/ 2>/dev/null || true
          cp ./lib-output/SharpImage.deps.json ./lib-package/ 2>/dev/null || true
          cp LICENSE ./lib-package/ 2>/dev/null || true
          cp README.md ./lib-package/ 2>/dev/null || true
          cd ./lib-package && zip -r ../SharpImage-Library.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-dll
          path: SharpImage-Library.zip
          retention-days: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release with all artifacts.
  # Runs as long as the workflow was not cancelled — tolerates partial build
  # failures (e.g. a single platform miss) via continue-on-error above.
  # ───────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-dll]
    if: ${{ !cancelled() }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "TAG=v$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: SharpImage v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: ./release-assets/**
          body: |
            ## Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | 🪟 Windows x64 | `SharpImage-Cli-win-x64.zip` | Native AOT CLI executable |
            | 🐧 Linux x64 | `SharpImage-Cli-linux-x64.tar.gz` | Native AOT CLI executable |
            | 🍎 macOS x64 (Intel) | `SharpImage-Cli-osx-x64.tar.gz` | Native AOT CLI executable |
            | 🍎 macOS ARM64 (Apple Silicon) | `SharpImage-Cli-osx-arm64.tar.gz` | Native AOT CLI executable |
            | 📦 Library DLL | `SharpImage-Library.zip` | Managed DLL — add as a direct reference |

            > **Prefer NuGet?** `dotnet add package Echostorm.SharpImage --version ${{ steps.version.outputs.VERSION }}`

            ---
