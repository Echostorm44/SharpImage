# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Continuous Integration: Build + Test on push and pull requests
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run TUnit tests
        run: dotnet run --project tests/SharpImage.Tests -c ${{ env.CONFIGURATION }} --no-build
